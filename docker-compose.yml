name: ocpp-evse-lab

services:

  mariadb:
    image: mariadb:10.11
    container_name: lab10_mariadb
    restart: unless-stopped
    environment:
      MARIADB_ROOT_PASSWORD: changeme
      MARIADB_DATABASE: stevedb
      MARIADB_USER: steve
      MARIADB_PASSWORD: changeme
    volumes:
      - mariadb_data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306"
    healthcheck:
      test: ["CMD", "mariadb-admin", "ping", "-h", "127.0.0.1", "-uroot", "-pchangeme"]
      interval: 5s
      timeout: 3s
      retries: 20

  steve:
    build:
      context: ./external/steve
      dockerfile: Dockerfile
    container_name: lab10_steve
    restart: unless-stopped
    depends_on:
      mariadb:
        condition: service_healthy
    environment:
      DB_HOST: mariadb
      DB_PORT: 3306
      DB_DATABASE: stevedb
      DB_USER: steve
      DB_PASSWORD: changeme
      STEVE_HOST: 0.0.0.0
      STEVE_HTTP_PORT: 8180
      STEVE_HTTPS_ENABLED: "false"
    ports:
      - "127.0.0.1:8180:8180"
    volumes:
      - steve_logs:/code/main.log

volumes:
  mariadb_data:
  steve_logs:
